<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://sites.google.com/view/calendarioescolatecnica/início">
    <title>Calendário Escola Técnica</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .loader-container {
            text-align: center;
            color: white;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            font-weight: 300;
            margin: 0;
        }
        p {
            margin-top: 10px;
            opacity: 0.8;
            font-size: 14px;
        }
        a {
            color: white;
            text-decoration: underline;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <h1>Carregando Calendário...</h1>
        <p>Você será redirecionado em instantes</p>
        <p><a href="https://sites.google.com/view/calendarioescolatecnica/início">Clique aqui se não for redirecionado automaticamente</a></p>
    </div>
    
    <script>
        window.location.replace("https://sites.google.com/view/calendarioescolatecnica/início");
    </script>
</body>
</html>
